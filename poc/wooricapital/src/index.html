<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리WON카 — 맞춤형 자동차 추천</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f4f5f7;font-size:13px;color:#111;}

/* TOP BAR */
.topbar{height:36px;background:#f9f9f9;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;justify-content:flex-end;padding:0 24px;gap:8px;font-size:12px;color:#555;}
.tb-user{display:inline-flex;align-items:center;gap:5px;border:1px solid #ccc;border-radius:4px;padding:3px 10px;background:#fff;font-size:12px;color:#888;}
.tb-apply{background:#1a56db;color:#fff;border:none;border-radius:4px;padding:4px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}

/* HEADER */
.header{background:#fff;border-bottom:1px solid #e8e8e8;padding:10px 24px;display:flex;align-items:center;}
.logo{font-size:26px;font-weight:900;letter-spacing:-0.04em;color:#0a1628;margin-right:22px;}
.logo span{color:#1a56db;}
.search-bar{flex:1;max-width:500px;border:2px solid #cbd5e1;border-radius:24px;display:flex;align-items:center;padding:7px 18px;background:#fff;}
.search-bar input{border:none;outline:none;flex:1;font-size:13px;font-family:inherit;color:#333;}
.search-bar input::placeholder{color:#aaa;}
.s-icon{color:#94a3b8;font-size:16px;}
.hnav{margin-left:auto;display:flex;gap:24px;}
.hico{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-size:11px;color:#666;}
.hico svg{width:22px;height:22px;}

/* LAYOUT */
.page{display:flex;height:calc(100vh - 82px);overflow:hidden;}
.left{flex:1;overflow-y:auto;padding:18px 20px;}
.right{width:248px;min-width:248px;background:#fff;border-left:1px solid #e4e4e4;display:flex;flex-direction:column;padding:0;}

/* BANNER */
.banner{width:100%;height:220px;border-radius:14px;background:linear-gradient(120deg,#1e3a5f,#2563eb 60%,#60a5fa);position:relative;overflow:hidden;margin-bottom:20px;display:flex;align-items:center;padding:32px 40px;}
.banner h2{font-size:24px;font-weight:900;color:#fff;line-height:1.3;letter-spacing:-0.03em;margin-bottom:6px;}
.banner p{font-size:12px;color:rgba(255,255,255,.7);margin-bottom:14px;line-height:1.6;}
.banner-cta{display:inline-block;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:20px;padding:6px 18px;font-size:11px;font-weight:700;cursor:pointer;}
.banner-deco{position:absolute;right:40px;top:50%;transform:translateY(-50%);font-size:80px;opacity:.15;}

/* SECTION */
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.sec-hdr h3{font-size:15px;font-weight:700;color:#0a1628;}

/* PRODUCT GRID — 4 columns */
.prod-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.prod-card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .15s;}
.prod-card:hover{box-shadow:0 6px 20px rgba(26,86,219,.1);transform:translateY(-2px);}
.pc-img{position:relative;height:160px;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.pc-img img{width:100%;height:100%;object-fit:contain;object-position:center;}
.pc-tag{position:absolute;top:8px;left:8px;font-size:9px;font-weight:700;border-radius:4px;padding:2px 6px;}
.tag-k{background:rgba(26,86,219,.25);color:#60a5fa;border:1px solid rgba(96,165,250,.4);}
.tag-i{background:rgba(255,152,0,.2);color:#fbbf24;border:1px solid rgba(251,191,36,.4);}
.tag-h{background:rgba(40,199,111,.2);color:#34d399;border:1px solid rgba(52,211,153,.4);}
.pc-btns{position:absolute;bottom:8px;left:0;right:0;display:flex;gap:5px;padding:0 8px;}
.pc-btn{flex:1;background:rgba(255,255,255,.9);border:none;border-radius:5px;padding:5px;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;}
.pc-btn:hover{background:#fff;}
.pc-info{padding:9px 11px 11px;}
.pc-brand{font-size:10px;color:#aaa;margin-bottom:1px;}
.pc-name{font-size:12px;font-weight:700;color:#0a1628;margin-bottom:3px;line-height:1.35;}
.pc-spec{font-size:10px;color:#999;margin-bottom:5px;}
.pc-price{font-size:15px;font-weight:900;color:#0a1628;}
.pc-unit{font-size:10px;color:#888;}

/* RIGHT: PROFILE */
.rg-top{padding:18px 14px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px;}
.rg-avatar{width:40px;height:40px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.rg-info .rg-name{font-size:13px;font-weight:700;color:#475569;}
.rg-info .rg-hint{font-size:11px;color:#94a3b8;margin-top:2px;line-height:1.5;}
.rg-switch{margin:12px;background:linear-gradient(90deg,#1a56db,#5a8dee);border:none;border-radius:8px;padding:10px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;width:calc(100% - 24px);}

/* Profile details */
.rg-details{padding:12px 14px;font-size:11px;color:#666;}
.rg-details-item{padding:6px 0;border-bottom:1px solid #f0f0f0;}
.rg-details-label{font-weight:600;color:#0a1628;}

/* FLOATING AGENT BUTTON */
.agent-fab{position:fixed;bottom:28px;right:28px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#7b2ff7,#b44cff);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 20px rgba(123,47,247,.4);z-index:100;transition:transform .2s,box-shadow .2s;}
.agent-fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(123,47,247,.55);}
.agent-fab-label{position:fixed;bottom:34px;right:88px;background:rgba(30,30,40,.85);color:#fff;font-size:11px;font-weight:700;border-radius:20px;padding:5px 13px;white-space:nowrap;z-index:100;pointer-events:none;opacity:0;transition:opacity .2s;}
.agent-fab:hover + .agent-fab-label{opacity:1;}

/* CHAT PANEL */
.chat-panel{position:fixed;top:0;right:-680px;width:680px;height:100vh;background:#fff;z-index:200;display:flex;box-shadow:-4px 0 40px rgba(0,0,0,.15);transition:right .35s cubic-bezier(.4,0,.2,1);}
.chat-panel.open{right:0;}
.chat-left{flex:1;display:flex;flex-direction:column;border-right:1px solid #f0f0f0;}
.chat-top{padding:14px 18px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px;}
.chat-close{margin-left:auto;background:none;border:none;font-size:20px;cursor:pointer;color:#aaa;padding:4px;}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:300;}
.modal-content{background:#fff;border-radius:16px;padding:40px;max-width:500px;box-shadow:0 10px 40px rgba(0,0,0,.2);}
.modal-title{font-size:24px;font-weight:900;margin-bottom:10px;color:#0a1628;}
.modal-desc{font-size:14px;color:#666;margin-bottom:30px;line-height:1.6;}
.customer-list{display:grid;gap:12px;}
.customer-card{background:#f9f9f9;border:2px solid #e0e0e0;border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;}
.customer-card:hover{border-color:#1a56db;background:#f0f4ff;}
.customer-card.active{border-color:#1a56db;background:#1a56db;color:#fff;}
.customer-avatar{font-size:32px;margin-bottom:8px;}
.customer-name{font-size:14px;font-weight:700;margin-bottom:6px;}
.customer-info{font-size:11px;opacity:.7;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <span id="user-indicator">고객 선택</span>
  <div class="tb-user" id="user-badge">👤 미선택</div>
  <span>비교</span>
  <button class="tb-apply" onclick="switchCustomer()">고객 변경</button>
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">우리<span>WON</span>카</div>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="차량을 입력하고 더 깊어진 우리WON카를 경험해 보세요.">
    <span class="s-icon">🔍</span>
  </div>
  <div class="hnav">
    <div class="hico"><span style="font-size:16px;">📋</span><div>구매내역</div></div>
    <div class="hico"><span style="font-size:16px;">❤️</span><div>나의 찜</div></div>
    <div class="hico"><span style="font-size:16px;">🛒</span><div>장바구니</div></div>
  </div>
</div>

<!-- PAGE -->
<div class="page">
  <div class="left">
    <!-- BANNER -->
    <div class="banner" style="background:url('assets/images/banner.svg') center/cover no-repeat; padding:0; display:flex; align-items:flex-end; padding:20px 40px;">
      <div style="color:white; font-size:14px; opacity:0.9;">
        <div style="margin-top:40px; padding-bottom:20px;">선택한 고객 맞춤 추천이 준비되었습니다</div>
      </div>
    </div>

    <!-- SEARCH RESULTS SECTION -->
    <div id="search-section" style="display:none;">
      <div class="sec-hdr">
        <h3 id="search-title">검색 결과</h3>
      </div>
      <div class="prod-grid" id="search-grid">
        <!-- Search results will be inserted here -->
      </div>
    </div>

    <!-- RECOMMENDED PRODUCTS -->
    <div id="recommended-section">
      <div class="sec-hdr">
        <h3 id="rec-title">추천 자동차</h3>
      </div>
      <div class="prod-grid" id="products-grid">
        <!-- Products will be inserted here -->
      </div>
    </div>
  </div>

  <!-- RIGHT SIDEBAR -->
  <div class="right">
    <div class="rg-top">
      <div class="rg-avatar" id="profile-avatar">👤</div>
      <div class="rg-info">
        <div class="rg-name" id="profile-name">미선택</div>
        <div class="rg-hint" id="profile-hint">고객을 선택해주세요</div>
      </div>
    </div>

    <div class="rg-details" id="profile-details" style="display:none;">
      <div class="rg-details-item">
        <span class="rg-details-label">성별:</span> <span id="detail-gender"></span>
      </div>
      <div class="rg-details-item">
        <span class="rg-details-label">나이:</span> <span id="detail-age"></span>
      </div>
      <div class="rg-details-item">
        <span class="rg-details-label">신용점수:</span> <span id="detail-score"></span>
      </div>
      <div class="rg-details-item">
        <span class="rg-details-label">보유차량:</span> <span id="detail-car"></span>
      </div>
      <div class="rg-details-item">
        <span class="rg-details-label">선호 차종:</span> <span id="detail-type"></span>
      </div>
    </div>

    <button class="rg-switch" onclick="switchCustomer()">고객 변경</button>
  </div>
</div>

<!-- FLOATING AGENT BUTTON -->
<button class="agent-fab" onclick="openChat()">💬</button>
<div class="agent-fab-label">AI 어시스턴트</div>

<!-- CHAT PANEL -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-left">
    <div class="chat-top">
      <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#7b2ff7,#b44cff);display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;">🤖</div>
      <div>
        <div style="font-size:14px;font-weight:700;">우리WON카 어시스턴트</div>
        <div style="font-size:11px;color:#888;">항상 온라인</div>
      </div>
      <button class="chat-close" onclick="closeChat()">✕</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:16px;">
      <div style="display:flex;gap:10px;margin-bottom:16px;">
        <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#7b2ff7,#b44cff);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;">🤖</div>
        <div style="max-width:78%;padding:10px 14px;border-radius:14px;background:#f1f4ff;color:#1a1a2e;border-bottom-left-radius:4px;font-size:13px;line-height:1.6;">안녕하세요! 원하시는 자동차에 대해 말씀해주세요.</div>
      </div>
    </div>
    <div style="padding:12px 16px;border-top:1px solid #f0f0f0;display:flex;gap:8px;align-items:center;">
      <input type="text" placeholder="메시지를 입력하세요..." style="flex:1;border:1.5px solid #e0e0e0;border-radius:22px;padding:9px 16px;font-size:13px;font-family:inherit;outline:none;transition:border .15s;">
      <button style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#7b2ff7,#b44cff);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;">➤</button>
    </div>
  </div>
</div>

<!-- CUSTOMER SELECTION MODAL -->
<div class="modal-backdrop" id="customer-modal" style="display:none;">
  <div class="modal-content">
    <div class="modal-title">어느 고객으로 시작하시겠습니까?</div>
    <div class="modal-desc">고객을 선택하면 맞춤형 자동차 추천을 받을 수 있습니다.</div>
    <div class="customer-list" id="customer-list">
      <!-- Customers will be inserted here -->
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
